<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Plans Éclairage Extérieure</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f3f4f6;overflow:hidden;}

header{
display:flex;
gap:6px;
padding:10px;
background:#1f2937;
color:white;
flex-wrap:wrap;
align-items:center;
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}

button.active{background:#16a34a;}

#tabs{
display:flex;
gap:6px;
padding:6px;
background:#e5e7eb;
overflow-x:auto;
}

.tab{
padding:6px 10px;
background:#9ca3af;
border-radius:6px;
cursor:pointer;
white-space:nowrap;
}

.tab.active{background:#2563eb;color:white;}

#viewer{
position:relative;
height:calc(100vh - 120px);
background:#ddd;
overflow:hidden;
cursor:grab;
}

#viewer.dragging{cursor:grabbing;}

#planContainer{
position:absolute;
transform-origin:0 0;
}

.point{
position:absolute;
width:10px;height:10px;
border-radius:50%;
border:2px solid white;
transform:translate(-50%,-50%);
cursor:pointer;
}

.green{background:#16a34a;}
.red{background:#dc2626;}

.popup{
position:absolute;
background:white;
border:1px solid #333;
padding:10px;
display:none;
z-index:100;
}

textarea{width:200px;height:80px;}
</style>
</head>

<body>

<header>

<input type="file" id="planFile" accept="image/*">
<button onclick="addPlan()">+ Plan</button>
<button onclick="resetZoom()">🎯 Reset</button>

<button id="btnAdd" onclick="setMode('add')">Ajouter point</button>
<button id="btnDelete" onclick="setMode('delete')">Supprimer point</button>
<button id="btnRead" onclick="setMode('read')" class="active">Lecture</button>

<button onclick="toggleLock()" id="lockBtn">🔒</button>

</header>

<div id="tabs"></div>
<div id="viewer"></div>

<div id="popup" class="popup">
<textarea id="note"></textarea><br><br>
<select id="state">
<option value="green">Fonctionnel</option>
<option value="red">Défectueux</option>
</select><br><br>
<button onclick="saveNote()">Sauvegarder</button>
</div>

<script>

// FIREBASE
const firebaseConfig={
apiKey:"AIzaSyC6g7hrPO5XIvUZR3hi-oSO_MoLFwdotZM",
authDomain:"plan-eclairage.firebaseapp.com",
projectId:"plan-eclairage"
};

firebase.initializeApp(firebaseConfig)
const cloudDB=firebase.firestore()

let plans={}
let currentPlan=null

let mode="read"
let locked=true

let scale=1
let offsetX=0
let offsetY=0

let planWidth=0
let planHeight=0

let draggingView=false
let draggingPoint=null
let moved=false

let startX=0
let startY=0

let selectedPoint=null

const viewer=document.getElementById("viewer")

btnAdd.style.display="none"
btnDelete.style.display="none"

// LOCK
function toggleLock(){

if(locked){
let pass=prompt("Mot de passe :")
if(pass!=="git2846") return alert("Incorrect")
locked=false
lockBtn.innerText="🔓"
btnAdd.style.display="inline-block"
btnDelete.style.display="inline-block"
}else{
locked=true
mode="read"
lockBtn.innerText="🔒"
btnAdd.style.display="none"
btnDelete.style.display="none"
setMode("read")
}
}

// MODE
function setMode(m){
if(locked) return
mode=m

btnAdd.classList.remove("active")
btnDelete.classList.remove("active")
btnRead.classList.remove("active")

if(m==="add") btnAdd.classList.add("active")
if(m==="delete") btnDelete.classList.add("active")
if(m==="read") btnRead.classList.add("active")
}

// CLOUD
async function saveCloud(){
await cloudDB.collection("plans").doc("data").set({plans})
}

function loadCloud(){
cloudDB.collection("plans").doc("data")
.onSnapshot(doc=>{
const data=doc.data()
if(!data) return
plans=data.plans||{}
if(!currentPlan)
currentPlan=Object.keys(plans)[0]
renderTabs()
openPlan(true)
})
}

// TABS
function renderTabs(){

tabs.innerHTML=""

Object.keys(plans).forEach(name=>{

const t=document.createElement("div")
t.className="tab"
if(name===currentPlan) t.classList.add("active")

t.innerText=name

t.onclick=()=>{
currentPlan=name
renderTabs()
openPlan(true)
}

tabs.appendChild(t)

})
}

// ADD PLAN
function addPlan(){

const file=planFile.files[0]
if(!file) return

const reader=new FileReader()

reader.onload=e=>{

const name=file.name.replace(/\.[^/.]+$/,"")

plans[name]={file:e.target.result,points:{}}
currentPlan=name

saveCloud()
renderTabs()
openPlan(true)

}

reader.readAsDataURL(file)
}

// OPEN
function openPlan(reset=false){

viewer.innerHTML=""
closePopup()

const p=plans[currentPlan]
if(!p) return

const container=document.createElement("div")
container.id="planContainer"
viewer.appendChild(container)

const img=document.createElement("img")
img.src=p.file

img.onload=()=>{
planWidth=img.width
planHeight=img.height
centerPlan()
}

container.appendChild(img)

// CLICK (séparé du drag)
viewer.addEventListener("click", e=>{
if(moved){ moved=false; return }
if(mode!=="add"||locked) return

const pos=getCoords(e)

plans[currentPlan].points[Date.now()]={
x:pos.x,y:pos.y,note:"",state:"green"
}

saveCloud()
drawPoints()
})

drawPoints()
}

// RESET
function resetZoom(){
centerPlan()
}

// CENTER
function centerPlan(){

const rect=viewer.getBoundingClientRect()

scale=Math.min(rect.width/planWidth,rect.height/planHeight)

offsetX=(rect.width-planWidth*scale)/2
offsetY=(rect.height-planHeight*scale)/2

updateTransform()
}

function updateTransform(){
const c=document.getElementById("planContainer")
if(c){
c.style.transform=
`translate(${offsetX}px,${offsetY}px) scale(${scale})`
}
}

// ZOOM
viewer.onwheel=e=>{
e.preventDefault()

const rect=viewer.getBoundingClientRect()
const mx=e.clientX-rect.left
const my=e.clientY-rect.top

const zoom=1.1
let newScale=e.deltaY<0 ? scale*zoom : scale/zoom

newScale=Math.max(0.2,Math.min(5,newScale))

const wx=(mx-offsetX)/scale
const wy=(my-offsetY)/scale

offsetX=mx-wx*newScale
offsetY=my-wy*newScale

scale=newScale

updateTransform()
}

// DRAG PLAN (FIX)
viewer.onmousedown=e=>{

if(e.target.classList.contains("point")) return

draggingView=true
moved=false

startX=e.clientX
startY=e.clientY

viewer.classList.add("dragging")
}

viewer.onmousemove=e=>{

if(draggingView){

const dx=e.clientX-startX
const dy=e.clientY-startY

if(Math.abs(dx)>3 || Math.abs(dy)>3){
moved=true
}

offsetX+=dx
offsetY+=dy

startX=e.clientX
startY=e.clientY

updateTransform()
}

if(draggingPoint&&!locked){
const pos=getCoords(e)
plans[currentPlan].points[draggingPoint].x=pos.x
plans[currentPlan].points[draggingPoint].y=pos.y
drawPoints()
}
}

viewer.onmouseup=()=>{
draggingView=false
draggingPoint=null
viewer.classList.remove("dragging")
saveCloud()
}

// COORD
function getCoords(e){
const rect=viewer.getBoundingClientRect()
return{
x:(e.clientX-rect.left-offsetX)/scale,
y:(e.clientY-rect.top-offsetY)/scale
}
}

// POINTS
function drawPoints(){

const c=document.getElementById("planContainer")
if(!c) return

c.querySelectorAll(".point").forEach(p=>p.remove())

Object.entries(plans[currentPlan].points).forEach(([id,p])=>{

const d=document.createElement("div")

d.className="point "+p.state
d.style.left=p.x+"px"
d.style.top=p.y+"px"

d.onclick=e=>{
e.stopPropagation()

if(mode==="delete"&&!locked){
delete plans[currentPlan].points[id]
saveCloud()
drawPoints()
return
}

if(mode==="read"){
selectedPoint=id
popup.style.display="block"
popup.style.left=e.clientX+"px"
popup.style.top=e.clientY+"px"
note.value=p.note
state.value=p.state
}
}

d.onmousedown=e=>{
if(locked) return
draggingPoint=id
e.stopPropagation()
}

c.appendChild(d)

})
}

// NOTES
function saveNote(){

const p=plans[currentPlan].points[selectedPoint]

p.note=note.value
p.state=state.value

saveCloud()
drawPoints()

popup.style.display="none"

}

function closePopup(){
popup.style.display="none"
}

// INIT
loadCloud()

</script>

</body>
</html>
