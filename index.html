<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Plans Cloud</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f3f4f6;
}

header{
display:flex;
gap:6px;
padding:10px;
background:#1f2937;
color:white;
flex-wrap:wrap;
}

button{
padding:6px 10px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
cursor:pointer;
}

button.active{
background:#16a34a;
}

#tabs{
display:flex;
gap:6px;
padding:6px;
background:#e5e7eb;
}

.tab{
padding:6px 10px;
background:#9ca3af;
border-radius:6px;
cursor:pointer;
}

.tab.active{
background:#2563eb;
color:white;
}

#viewer{
position:relative;
height:calc(100vh - 120px);
background:#ddd;
overflow:hidden;
}

#planContainer{
position:absolute;
transform-origin:0 0;
}

.point{
position:absolute;
width:12px;
height:12px;
border-radius:50%;
border:2px solid white;
transform:translate(-50%,-50%);
cursor:pointer;
}

.green{background:#16a34a;}
.red{background:#dc2626;}

.popup{
position:absolute;
background:white;
border:1px solid #333;
padding:10px;
display:none;
z-index:100;
}

textarea{
width:200px;
height:80px;
}

</style>

</head>

<body>

<header>

<input type="file" id="planFile" accept="image/*,.pdf">

<button onclick="addPlan()">+ Plan</button>

<button id="btnAdd" onclick="setMode('add')">Ajouter</button>
<button id="btnDelete" onclick="setMode('delete')">Supprimer</button>
<button id="btnRead" onclick="setMode('read')" class="active">Lecture</button>

<button onclick="toggleLock()" id="lockBtn">🔓</button>

</header>

<div id="tabs"></div>

<div id="viewer"></div>

<div id="popup" class="popup">

<textarea id="note"></textarea>

<br><br>

<select id="state">
<option value="green">Fonctionnel</option>
<option value="red">Défectueux</option>
</select>

<br><br>

<button onclick="saveNote()">Sauvegarder</button>

</div>

<script>

const firebaseConfig = {

apiKey: "AIzaSyC6g7hrPO5XIvUZR3hi-oSO_MoLFwdotZM",
authDomain: "plan-eclairage.firebaseapp.com",
projectId: "plan-eclairage",
storageBucket: "plan-eclairage.firebasestorage.app",
messagingSenderId: "279933407901",
appId: "1:279933407901:web:969ed5a2975d969e65fa74"

};

firebase.initializeApp(firebaseConfig)

const cloudDB = firebase.firestore()

let plans={}
let currentPlan=null

let mode="read"
let locked=false

let scale=1
let offsetX=0
let offsetY=0

let planWidth=0
let planHeight=0

let dragging=null
let selectedPoint=null

const viewer=document.getElementById("viewer")

function closePopup(){
popup.style.display="none"
}

function setMode(m){

if(locked) return

mode=m

btnAdd.classList.remove("active")
btnDelete.classList.remove("active")
btnRead.classList.remove("active")

if(m==="add") btnAdd.classList.add("active")
if(m==="delete") btnDelete.classList.add("active")
if(m==="read") btnRead.classList.add("active")

}

function toggleLock(){

locked=!locked

if(locked){

mode="read"

btnAdd.style.display="none"
btnDelete.style.display="none"

lockBtn.innerText="🔒"

}else{

btnAdd.style.display="inline-block"
btnDelete.style.display="inline-block"

lockBtn.innerText="🔓"

}

}

async function saveCloud(){

await cloudDB.collection("plans").doc("data").set(
{plans:plans},
{merge:true}
)

}

function loadCloud(){

cloudDB.collection("plans").doc("data")
.onSnapshot(doc=>{

const data=doc.data()

if(!data) return

plans=data.plans || {}

if(!currentPlan)
currentPlan=Object.keys(plans)[0]

renderTabs()
openPlan()

})

}

function renderTabs(){

tabs.innerHTML=""

Object.keys(plans).forEach(name=>{

const t=document.createElement("div")

t.className="tab"

if(name===currentPlan) t.classList.add("active")

t.innerText=name

t.onclick=()=>{

closePopup()

currentPlan=name
renderTabs()
openPlan()

}

tabs.appendChild(t)

})

}

async function addPlan(){

const file=planFile.files[0]
if(!file) return

const reader=new FileReader()

reader.onload=async e=>{

let fileData=e.target.result
let fileType=file.type

// conversion PDF → image pour accélérer

if(fileType==="application/pdf"){

const pdf=await pdfjsLib.getDocument(fileData).promise
const page=await pdf.getPage(1)

const viewport=page.getViewport({scale:2})

const canvas=document.createElement("canvas")
canvas.width=viewport.width
canvas.height=viewport.height

await page.render({
canvasContext:canvas.getContext("2d"),
viewport
}).promise

fileData=canvas.toDataURL("image/jpeg",0.9)
fileType="image/jpeg"

}

const name="Plan "+(Object.keys(plans).length+1)

plans[name]={

file:fileData,
fileType:fileType,
points:{}

}

currentPlan=name

saveCloud()
renderTabs()
openPlan()

}

reader.readAsDataURL(file)

}

async function openPlan(){

viewer.innerHTML=""
closePopup()

const p=plans[currentPlan]
if(!p) return

const container=document.createElement("div")
container.id="planContainer"

viewer.appendChild(container)

const img=document.createElement("img")
img.src=p.file

img.onload=()=>{

planWidth=img.width
planHeight=img.height

centerPlan()

}

container.appendChild(img)

viewer.onclick=e=>{

closePopup()

if(mode!=="add") return

const pos=getCoords(e)

const id=Date.now()

plans[currentPlan].points[id]={

x:pos.x,
y:pos.y,
note:"",
state:"green"

}

saveCloud()

drawPoints()

}

drawPoints()

}

function centerPlan(){

const rect=viewer.getBoundingClientRect()

scale=Math.min(rect.width/planWidth,rect.height/planHeight)

offsetX=(rect.width-planWidth*scale)/2
offsetY=(rect.height-planHeight*scale)/2

updateTransform()

}

function updateTransform(){

const c=document.getElementById("planContainer")

if(c)
c.style.transform=`translate(${offsetX}px,${offsetY}px) scale(${scale})`

}

function getCoords(e){

const rect=viewer.getBoundingClientRect()

return{

x:(e.clientX-rect.left-offsetX)/scale,
y:(e.clientY-rect.top-offsetY)/scale

}

}

function drawPoints(){

const c=document.getElementById("planContainer")

if(!c) return

c.querySelectorAll(".point").forEach(p=>p.remove())

Object.entries(plans[currentPlan].points).forEach(([id,p])=>{

const d=document.createElement("div")

d.className="point "+p.state

d.style.left=p.x+"px"
d.style.top=p.y+"px"

d.onclick=e=>{

e.stopPropagation()

closePopup()

if(mode==="delete"){

delete plans[currentPlan].points[id]
saveCloud()
drawPoints()
return

}

if(mode==="read"){

selectedPoint=id

popup.style.display="block"
popup.style.left=e.clientX+"px"
popup.style.top=e.clientY+"px"

note.value=p.note
state.value=p.state

}

}

d.onmousedown=()=>dragging=id

c.appendChild(d)

})

}

viewer.onmousemove=e=>{

if(!dragging) return

const pos=getCoords(e)

plans[currentPlan].points[dragging].x=pos.x
plans[currentPlan].points[dragging].y=pos.y

drawPoints()

}

viewer.onmouseup=()=>{

if(dragging){

saveCloud()
dragging=null

}

}

function saveNote(){

const p=plans[currentPlan].points[selectedPoint]

p.note=note.value
p.state=state.value

saveCloud()

closePopup()

drawPoints()

}

loadCloud()

</script>

</body>
</html>
